<script>
// Neon flicker — carried over from the old site.
// Respect prefers-reduced-motion: don't start the loop at all.
(function() {
    if (window.matchMedia && window.matchMedia('(prefers-reduced-motion: reduce)').matches) {
        return;
    }
    const groups = {
        th: Array.from(document.querySelectorAll('h1 span[data-group="th"]')),
        ng: Array.from(document.querySelectorAll('h1 span[data-group="ng"]'))
    };
    const solo = Array.from(document.querySelectorAll('h1 span[data-solo]'));

    function rand(min, max) {
        return Math.floor(Math.random() * (max - min + 1) + min);
    }

    function flicker(spans, stagger) {
        spans.forEach(function(el, i) {
            setTimeout(function() {
                el.classList.add('flickering');
                setTimeout(function() { el.classList.remove('flickering'); }, 800);
            }, i * (stagger || 0));
        });
    }

    function next() {
        var roll = Math.random();
        if (roll < 0.2) {
            flicker(groups.th, 0);
            setTimeout(next, rand(3000, 5000));
        } else if (roll < 0.5) {
            flicker(groups.ng, 120);
            setTimeout(next, rand(2500, 4500));
        } else {
            flicker([solo[rand(0, solo.length - 1)]], 0);
            setTimeout(next, rand(1500, 3500));
        }
    }

    next();
})();
