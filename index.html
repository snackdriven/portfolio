  :root {

      0 2px 4px rgba(0, 0, 0, 0.4);
  }

  @keyframes neon-flicker {
    0%, 76% {
      text-shadow:
        0 0 2px var(--green),
        0 0 8px rgba(74, 238, 160, 0.5),
        0 0 16px rgba(74, 238, 160, 0.3),

        1.5px 0 2px rgba(255, 107, 157, 0.35),
        -1.5px 0 2px rgba(181, 178, 200, 0.35);
    }
    77% {
      text-shadow:
        0 0 2px var(--green),
        0 0 8px rgba(74, 238, 160, 0.5),
        0 0 16px rgba(74, 238, 160, 0.3),
        0 2px 4px rgba(0, 0, 0, 0.4),
        -2.5px 0 2px rgba(255, 107, 157, 0.55),
        2.5px -1.5px 2px rgba(181, 178, 200, 0.55);
    }
    78% {
      text-shadow:
        0 0 2px var(--green),
        0 0 8px rgba(74, 238, 160, 0.5),
        0 0 16px rgba(74, 238, 160, 0.3),
        0 2px 4px rgba(0, 0, 0, 0.4),
        -4px 0 2.5px rgba(255, 107, 157, 0.7),
        3.5px -2.5px 2.5px rgba(181, 178, 200, 0.7);

    80% {

        0 0 16px rgba(74, 238, 160, 0.3),

<script>
// Neon flicker — carried over from the old site
(function() {
    const groups = {
        th: Array.from(document.querySelectorAll('h1 span[data-group="th"]')),
        ng: Array.from(document.querySelectorAll('h1 span[data-group="ng"]'))
    };
    const solo = Array.from(document.querySelectorAll('h1 span[data-solo]'));

    function rand(min, max) {
        return Math.floor(Math.random() * (max - min + 1) + min);
    }

    function flicker(spans, stagger) {
        spans.forEach(function(el, i) {
            setTimeout(function() {
                el.classList.add('flickering');
                setTimeout(function() { el.classList.remove('flickering'); }, 800);
            }, i * (stagger || 0));
        });
    }

    function next() {
        var roll = Math.random();
        if (roll < 0.2) {
            flicker(groups.th, 0);
            setTimeout(next, rand(3000, 5000));
        } else if (roll < 0.5) {
            flicker(groups.ng, 120);
            setTimeout(next, rand(2500, 4500));
        } else {
            flicker([solo[rand(0, solo.length - 1)]], 0);
            setTimeout(next, rand(1500, 3500));
        }
    }

    next();
})();

</script>
